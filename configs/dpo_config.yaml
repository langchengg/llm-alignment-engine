# ============================================================
# DPO (Direct Preference Optimization) Configuration
# Aligns model to prefer chosen over rejected responses
# Key param: beta controls KL penalty vs preference strength
# ============================================================

model:
  name_or_path: "Qwen/Qwen2.5-1.5B-Instruct"  # or path to SFT checkpoint
  sft_checkpoint: "./outputs/sft/final"          # load SFT model as base
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"

# QLoRA Configuration
qlora:
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true
  lora_r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# DPO-Specific Configuration
dpo:
  beta: 0.1                          # KL penalty coefficient
  # Higher beta → more conservative, less mode collapse
  # Lower beta  → more aggressive preference learning
  loss_type: "sigmoid"                # sigmoid | hinge | ipo
  label_smoothing: 0.0
  max_prompt_length: 512
  max_length: 1024

# Training Configuration
training:
  output_dir: "./outputs/dpo"
  num_train_epochs: 2
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-5              # lower LR for alignment stage
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  weight_decay: 0.01
  logging_steps: 10
  save_steps: 100
  save_total_limit: 3
  bf16: true
  gradient_checkpointing: true
  optim: "paged_adamw_32bit"
  report_to: "wandb"

# Dataset
dataset:
  path: "./data/preference_data"     # generated by preference_generator.py
  # expected format: {"prompt": ..., "chosen": ..., "rejected": ...}

# DeepSpeed
deepspeed_config: "configs/deepspeed_zero2.json"

# Ablation: beta sweep for Mode Collapse experiment
ablation:
  beta_values: [0.05, 0.1, 0.2, 0.5]
  description: >
    Sweep beta to find optimal KL penalty.
    Too low → mode collapse, model degenerates.
    Too high → model ignores preferences, stays close to SFT.
