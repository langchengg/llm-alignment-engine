# ============================================================
# PPO (Proximal Policy Optimization) Configuration
# RLHF-style training with reward model feedback
# ============================================================

model:
  name_or_path: "Qwen/Qwen2.5-1.5B-Instruct"
  sft_checkpoint: "./outputs/sft/final"
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"

# Reward Model
reward_model:
  name_or_path: "weqweasdas/RM-Gemma-2B"   # open-source reward model
  torch_dtype: "bfloat16"

# QLoRA Configuration
qlora:
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true
  lora_r: 32                       # smaller rank for PPO (memory constraint)
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"

# PPO-Specific Configuration
ppo:
  learning_rate: 1.4e-5
  batch_size: 4
  mini_batch_size: 2
  gradient_accumulation_steps: 4
  ppo_epochs: 4                     # inner PPO update epochs
  init_kl_coef: 0.2                 # initial KL penalty coefficient
  adap_kl_ctrl: true                # adaptive KL controller
  adap_kl_target: 6.0              # target KL divergence
  cliprange: 0.2
  cliprange_value: 0.2
  vf_coef: 0.1
  max_grad_norm: 1.0
  query_max_length: 256
  response_max_length: 512

# Training Configuration
training:
  output_dir: "./outputs/ppo"
  num_train_epochs: 1
  logging_steps: 5
  save_steps: 100
  save_total_limit: 2
  bf16: true
  gradient_checkpointing: true
  report_to: "wandb"

# Dataset
dataset:
  name: "gsm8k"
  split: "train[:1000]"             # smaller subset for PPO (slower training)

# DeepSpeed
deepspeed_config: "configs/deepspeed_zero2.json"
